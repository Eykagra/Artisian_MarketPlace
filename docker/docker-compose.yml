version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: artisan_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: artisan_market
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
